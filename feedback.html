<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - Hooked on Security</title>
    <style>
        *{
            box-sizing: border-box;
            margin: 0;
            padding: 0; 
        }

        body {
            font-family: sans-serif;
            color: #333;
            background-color: #ffffff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        a { text-decoration: none; color: inherit; transition: color 0.2s; }

        :root {
            --main-blue: #0A4C6A;
            --main-yellow: #ffcc00;
            --main-text: #333333;
            --border-light: #eeeeee;
        }

        header {
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2vh 5%;
            border-bottom: 1px solid var(--border-light);
        }

        .logo { 
            font-size: clamp(20px, 2.5vh, 24px);
            font-weight: bold;
            color: var(--main-blue);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo img { 
            height: clamp(28px, 4vh, 36px); 
            width: auto;
        }

        .nav-links {
            display: flex;
            gap: 0.3vw;
            align-items: center;
            font-weight: 500;
            color: var(--main-blue);
            font-size: clamp(14px, 1.8vh, 16px);
        }

        .nav-links a {
            padding: 1vh 1.0vw;
            border-radius: 10px;
            text-decoration: none;
        }

        .nav-links a:hover { opacity: 0.7; }

        .btn-active {
            background-color: var(--main-yellow);
            color: var(--main-blue);
            font-weight: bold;
        }

        .btn-active:hover {
            background-color: #e6b800;
            opacity: 1 !important;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #ffffff;
            border-radius: 8px;
            min-width: 220px;
            padding: 8px;
            box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.15);
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-top: 6px;
            z-index: 200;
        }

        .dropdown-content a {
            color: var(--main-blue);
            padding: 12px 14px;
            border-radius: 6px;
            font-size: clamp(14px, 1.8vh, 16px);
            display: block;
            margin-bottom: 4px;
            transition: background-color 0.2s ease;
        }

        .dropdown-content a:hover {
            background-color: var(--main-yellow);
            font-weight: bold;
            opacity: 1 !important;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }
        
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        footer {
            flex-shrink: 0;
            background-color: var(--main-blue);
            color: #ffffff;
            display: flex;
            justify-content: space-between;
            padding: 2vh 5%;
            font-size: clamp(13px, 1.8vh, 15px);
        }

        .footer-links { display: flex; gap: 2vw; }
        .footer-links a:hover { text-decoration: underline; }

    </style>
</head>

<body>
    <header>
        <div class="logo">
			<img src="./assets/logo.png" alt="Hooked on Security Logo">
			Hooked on Security
		</div>

		<div class="nav-links">
			<a href="index.html">Home</a>
            <div class="dropdown">
                <a href="training.html">Training</a>
                <div class="dropdown-content">
                    <a href="phishing-red-flags.html">Phishing Red Flags</a>
                    <a href="faq.html">FAQ</a>
                </div>
            </div>

            <a href="feedback.html" class="btn-active">Feedback</a>
            <a href="about.html">About Us</a>
        </div> 
    </header>

    <main>
        <div style="flex:1; display:flex; justify-content:center; align-items:center; padding: 4vh 5%;">
            <div style="width:100%; max-width:600px; border:1px solid var(--border-light); border-radius:12px; padding:3vh 3vw;">
                
                <h2 style="color: var(--main-blue); margin-bottom: 2vh;">We Value Your Feedback</h2>
                
                <form>
                    <div style="margin-bottom: 2vh;">
                        <label>Name</label><br>
                        <input type="text" placeholder="Enter your name" 
                            style="width:100%; padding:1vh; margin-top:0.5vh; border:1px solid var(--border-light); border-radius:8px;">
                    </div>

                    <div style="margin-bottom: 2vh;">
                        <label>Email</label><br>
                        <input type="email" placeholder="Enter your email" 
                            style="width:100%; padding:1vh; margin-top:0.5vh; border:1px solid var(--border-light); border-radius:8px;">
                    </div>

                    <div style="margin-bottom: 2vh;">
                        <label>Feedback</label><br>
                        <textarea rows="5" placeholder="Write your feedback..." 
                            style="width:100%; padding:1vh; margin-top:0.5vh; border:1px solid var(--border-light); border-radius:8px; resize:none;"></textarea>
                    </div>

                    <button type="submit" 
                        style="background-color: var(--main-yellow); color: var(--main-blue); border:none; padding:1vh 2vw; border-radius:10px; font-weight:bold; cursor:pointer;">
                        Submit Feedback
                    </button>
                </form>

            </div>
        </div>
    </main>

    <footer>
        <div class="copyright">© 2026 Hooked on Security</div>
        <div class="footer-links">
            <a href="#">Privacy Policy</a>
            <a href="#">Contact Support</a>
        </div>
    </footer>

</body>
</html>
